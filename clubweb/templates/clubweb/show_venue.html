{% extends 'clubweb/base.html' %}

{% block content %}


    <h1>{{ venue.name }}</h1>
    <br/>

    <div class="venue-details">
        <p><strong>Address:</strong> {{ venue.address }}</p>
        <p><strong>Zip Code:</strong> {{ venue.zip_code }}</p>
        <p><strong>Phone:</strong> {{ venue.phone }}</p>
        <p><strong>Web:</strong> <a href="{{ venue.web }}" target="_blank">{{ venue.web }}</a></p>
        <p><strong>Email:</strong> <a href="mailto:{{ venue.email_address }}">{{ venue.email_address }}</a></p>
    </div>
    
    <br/>
    <a href="{% url 'clubweb:venues' %}" class="btn btn-secondary">Back to Venues</a>


            </div>  

{% endblock %}
